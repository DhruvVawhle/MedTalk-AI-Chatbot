<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h2 {
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .upload-box {
            margin-bottom: 20px;
        }
        .chat-box {
            border: 1px solid #ddd;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
            border-radius: 5px;
            text-align: left;
        }
        .input-box {
            display: flex;
            margin-top: 10px;
        }
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        input {
            flex: 1;
            margin-right: 10px;
        }
        button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            font-size: 14px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Medical Chatbot</h2>
    <div class="container">
        <!-- PDF Upload Section -->
        <div class="upload-box">
            <input type="file" id="pdfInput" accept="application/pdf">
            <button onclick="uploadPDF()">Upload PDF</button>
        </div>
        
        <!-- Chat Box -->
        <div class="chat-box" id="chatBox"></div>
        
        <!-- User Input -->
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask a question...">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <p class="loading" id="loadingText">Loading...</p>
    </div>

    <script>
        function uploadPDF() {
            const fileInput = document.getElementById("pdfInput").files[0];
            if (!fileInput) {
                alert("Please select a PDF file to upload.");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput);

            fetch("/upload", { method: "POST", body: formData })
                .then(response => response.json())
                .then(data => {
                    alert(data.message || "PDF uploaded successfully!");
                })
                .catch(error => console.error("Upload Error:", error));
        }

        function sendMessage() {
            const userInput = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const loadingText = document.getElementById("loadingText");

            let message = userInput.value.trim();
            if (!message) return;

            chatBox.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
            userInput.value = "";
            loadingText.style.display = "block";

            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                loadingText.style.display = "none";
                chatBox.innerHTML += `<p><strong>Bot:</strong> ${data.reply}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                loadingText.style.display = "none";
                chatBox.innerHTML += `<p style="color: red;"><strong>Error:</strong> Failed to get response.</p>`;
                console.error("Chat Error:", error);
            });
        }
    </script>
</body>
</html>
